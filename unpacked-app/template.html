<style>
  /* ════════════════════════ TOKENS ════════════════════════ */
  :root{
    --brand-1:#073674; --brand-2:#052550; --brand-3:#1d5cbf;
    --grad-from:#2563eb; --grad-to:#2dd4bf;
    --ink-1:#13203a; --ink-2:#3a4a63; --ink-3:#6b7a92; --ink-4:#9aa7bd;
    --line:#e6eaf1; --line-soft:#eef1f6;
    --surface:#ffffff; --surface-2:#f6f8fc;
    --green:#15a378; --green-bg:#e9f8f1;
    --amber:#e0901f; --amber-bg:#fcf2db;
    --blue:#4178e6;  --blue-bg:#edf2fe;
    --red:#ec6a64;   --red-bg:#fdeeec;
    --violet:#7c5cff;--violet-bg:#f0ecff;
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px;
    --sh-1:0 1px 2px rgba(16,32,64,.05), 0 1px 3px rgba(16,32,64,.04);
    --sh-2:0 6px 18px -6px rgba(16,32,64,.12), 0 2px 6px -2px rgba(16,32,64,.06);
    --sh-3:0 18px 44px -14px rgba(16,32,64,.20);
    --sh-brand:0 14px 30px -10px rgba(7,54,116,.45);
    --sh-hero:0 18px 38px -12px rgba(37,99,235,.45);
    --sans:"Geist",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink-1);background:#eaeef5;
    background-image:radial-gradient(1200px 460px at 18% -8%, rgba(45,212,191,.10), transparent 60%),
      radial-gradient(1100px 520px at 100% -4%, rgba(37,99,235,.12), transparent 58%);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:14px;line-height:1.5}
  .app{display:flex;min-height:100vh}
  .mono{font-family:var(--mono);font-feature-settings:"tnum" 1;letter-spacing:-.01em}
  ::selection{background:rgba(37,99,235,.18)}

  /* ════════════════════════ SIDEBAR ════════════════════════ */
  .sidebar{width:266px;flex:none;position:sticky;top:0;height:100vh;background:var(--surface);
    border-right:1px solid var(--line);display:flex;flex-direction:column;padding:20px 16px;z-index:30}
  .brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}
  .brand__mark{width:42px;height:42px;border-radius:13px;flex:none;
    background:linear-gradient(150deg,var(--brand-3),var(--brand-1) 60%);box-shadow:var(--sh-brand);
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:16px;letter-spacing:.02em}
  .brand__name{font-weight:700;font-size:16px;letter-spacing:-.02em;line-height:1.1}
  .brand__tag{font-size:11px;color:var(--ink-3);font-weight:500}
  .nav-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-4);padding:14px 12px 8px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav__item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;
    color:var(--ink-2);font-weight:500;font-size:14px;cursor:pointer;border:1px solid transparent;
    transition:background .16s ease,color .16s ease,box-shadow .16s ease;position:relative}
  .nav__item svg{width:19px;height:19px;color:var(--ink-3);transition:color .16s ease}
  .nav__item:hover{background:var(--surface-2);color:var(--ink-1)}
  .nav__item:hover svg{color:var(--brand-3)}
  .nav__item.is-active{background:linear-gradient(140deg,var(--brand-3),var(--brand-1) 70%);color:#fff;box-shadow:var(--sh-brand)}
  .nav__item.is-active svg{color:#fff}
  .nav__badge{margin-left:auto;font-size:11px;font-weight:600;font-family:var(--mono);
    background:var(--surface-2);color:var(--ink-3);padding:1px 8px;border-radius:999px}
  .nav__item.is-active .nav__badge{background:rgba(255,255,255,.22);color:#fff}
  .sidebar__spacer{flex:1}
  .upsell{margin:8px 4px 12px;padding:16px;border-radius:16px;color:#fff;
    background:linear-gradient(155deg,#0c4a9e,var(--brand-2));box-shadow:var(--sh-brand);position:relative;overflow:hidden}
  .upsell::after{content:"";position:absolute;right:-26px;top:-26px;width:96px;height:96px;border-radius:50%;
    background:radial-gradient(circle,rgba(45,212,191,.55),transparent 70%)}
  .upsell h4{font-size:13.5px;font-weight:600;margin-bottom:4px;position:relative}
  .upsell p{font-size:12px;color:rgba(255,255,255,.78);line-height:1.45;margin-bottom:12px;position:relative}
  .upsell button{position:relative;width:100%;border:none;cursor:pointer;background:#fff;color:var(--brand-1);
    font-family:var(--sans);font-weight:600;font-size:12.5px;padding:9px;border-radius:10px;transition:transform .12s ease}
  .upsell button:hover{transform:translateY(-1px)}
  .user{display:flex;align-items:center;gap:11px;padding:10px;border-radius:13px;border:1px solid var(--line);background:var(--surface)}
  .avatar{flex:none;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;
    background:linear-gradient(145deg,#3b7bd6,var(--brand-1));font-size:13px}
  .user__name{font-size:13px;font-weight:600;line-height:1.2}
  .user__role{font-size:11.5px;color:var(--ink-3)}
  .user__logout{margin-left:auto;color:var(--ink-3);display:grid;place-items:center;cursor:pointer;border-radius:8px;padding:6px}
  .user__logout:hover{color:var(--red);background:var(--red-bg)}
  .user__logout svg{width:17px;height:17px}

  /* ════════════════════════ MAIN ════════════════════════ */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;height:68px;display:flex;align-items:center;gap:18px;padding:0 30px;
    background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar__title{font-size:15px;font-weight:600;color:var(--ink-2)}
  .topbar__crumb{color:var(--ink-4);font-weight:500}
  .search{margin-left:auto;display:flex;align-items:center;gap:10px;width:380px;max-width:38vw;
    background:var(--surface-2);border:1px solid var(--line);padding:0 14px;height:42px;border-radius:12px;color:var(--ink-3);
    transition:border-color .16s ease,box-shadow .16s ease,background .16s ease}
  .search:focus-within{background:#fff;border-color:var(--brand-3);box-shadow:0 0 0 4px rgba(37,99,235,.12)}
  .search svg{width:18px;height:18px;flex:none}
  .search input{border:none;background:none;outline:none;font-family:var(--sans);font-size:14px;color:var(--ink-1);width:100%}
  .search input::placeholder{color:var(--ink-4)}
  .search kbd{font-family:var(--mono);font-size:11px;color:var(--ink-4);background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  .icon-btn{position:relative;width:42px;height:42px;flex:none;border-radius:12px;border:1px solid var(--line);
    background:var(--surface);display:grid;place-items:center;color:var(--ink-2);cursor:pointer;transition:.16s ease}
  .icon-btn:hover{background:var(--surface-2);color:var(--brand-1);border-color:#d6deeb}
  .icon-btn svg{width:19px;height:19px}
  .icon-btn .dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid #fff}
  .scroll{flex:1;overflow-y:auto;padding:30px 30px 44px}
  .page{max-width:1320px;margin:0 auto;display:flex;flex-direction:column;gap:20px}

  /* page head */
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .pagehead h1{font-size:28px;font-weight:700;letter-spacing:-.025em;line-height:1.1}
  .pagehead h1 .wave{display:inline-block;animation:wave 2.4s ease-in-out infinite;transform-origin:70% 70%}
  @keyframes wave{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(14deg)}20%{transform:rotate(-8deg)}30%{transform:rotate(14deg)}40%{transform:rotate(-4deg)}}
  .pagehead p{color:var(--ink-3);font-size:14px;margin-top:6px}
  .pagehead p b{color:var(--ink-2);font-weight:600}
  .head-actions{display:flex;align-items:center;gap:10px}

  .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:13.5px;
    border-radius:11px;padding:11px 16px;cursor:pointer;border:1px solid transparent;transition:.14s ease;white-space:nowrap}
  .btn svg{width:17px;height:17px}
  .btn--ghost{background:var(--surface);border-color:var(--line);color:var(--ink-2)}
  .btn--ghost:hover{background:var(--surface-2);border-color:#d6deeb;color:var(--ink-1)}
  .btn--primary{background:linear-gradient(140deg,var(--brand-3),var(--brand-1) 75%);color:#fff;box-shadow:var(--sh-brand)}
  .btn--primary:hover{transform:translateY(-1px);box-shadow:0 18px 34px -10px rgba(7,54,116,.55)}
  .btn--primary:active{transform:translateY(0)}
  .head-actions .btn{min-width:162px;justify-content:center}
  .btn--sm{padding:9px 14px;font-size:13px;min-width:0}

  /* segmented control */
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;gap:2px;box-shadow:var(--sh-1)}
  .seg button{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-3);background:none;border:none;
    cursor:pointer;padding:7px 14px;border-radius:9px;transition:.14s ease;min-width:94px;text-align:center}
  .seg button:hover{color:var(--ink-1)}
  .seg button.is-active{background:linear-gradient(140deg,var(--brand-3),var(--brand-1));color:#fff;box-shadow:var(--sh-brand);font-weight:600}

  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--sh-1);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;position:relative;overflow:hidden;min-height:158px;display:flex;flex-direction:column}
  .kpi:hover{transform:translateY(-3px);box-shadow:var(--sh-2);border-color:#dbe3f0}
  .kpi__top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .kpi__label{font-size:13px;font-weight:600;color:var(--ink-3)}
  .kpi__chip{width:38px;height:38px;border-radius:12px;display:grid;place-items:center}
  .kpi__chip svg{width:19px;height:19px}
  .chip-blue{background:var(--blue-bg);color:var(--blue)}
  .chip-green{background:var(--green-bg);color:var(--green)}
  .chip-amber{background:var(--amber-bg);color:var(--amber)}
  .chip-red{background:var(--red-bg);color:var(--red)}
  .chip-violet{background:var(--violet-bg);color:var(--violet)}
  .kpi__value{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-.03em;line-height:1}
  .kpi__value .cur{font-size:14px;color:var(--ink-3);font-weight:500;margin-right:4px}
  .kpi__foot{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:14px}
  .delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:999px;font-family:var(--mono)}
  .delta svg{width:13px;height:13px}
  .delta--up{background:var(--green-bg);color:var(--green)}
  .delta--down{background:var(--red-bg);color:var(--red)}
  .kpi__note{font-size:12px;color:var(--ink-4)}
  .kpi__spark{position:absolute;right:0;bottom:0;width:56%;height:54px;opacity:.9;pointer-events:none}
  .kpi--hero{background:linear-gradient(135deg,var(--grad-from) 0%,#2a9bdb 52%,var(--grad-to) 100%);border:none;color:#fff;box-shadow:var(--sh-hero)}
  .kpi--hero::before{content:"";position:absolute;inset:0;background:radial-gradient(420px 180px at 88% -20%, rgba(255,255,255,.30), transparent 60%)}
  .kpi--hero .kpi__label{color:rgba(255,255,255,.85)}
  .kpi--hero .kpi__chip{background:rgba(255,255,255,.2);color:#fff}
  .kpi--hero .kpi__note{color:rgba(255,255,255,.78)}
  .kpi--hero .delta--up{background:rgba(255,255,255,.22);color:#fff}
  .kpi--hero *{position:relative}

  /* card */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-1);overflow:hidden}
  .card__head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 22px 14px}
  .card__title{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .card__sub{font-size:12.5px;color:var(--ink-3);margin-top:2px}
  .link{display:inline-flex;align-items:center;gap:5px;color:var(--brand-3);font-weight:600;font-size:13px;cursor:pointer;text-decoration:none}
  .link svg{width:15px;height:15px;transition:transform .14s ease}
  .link:hover svg{transform:translateX(2px)}
  .grid-8-4{display:grid;grid-template-columns:1.9fr 1fr;gap:18px;align-items:stretch}
  .grid-8-4>.card{display:flex;flex-direction:column;height:100%}

  /* legend / chart */
  .legend{display:flex;align-items:center;gap:16px}
  .legend span{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);font-weight:500}
  .legend i{width:11px;height:11px;border-radius:4px;display:inline-block}
  .chart-wrap{padding:6px 14px 18px;position:relative;flex:1;display:flex;align-items:center}
  #trend{width:100%;height:auto;display:block;overflow:visible}
  .tip{position:absolute;pointer-events:none;background:#0c1830;color:#fff;border-radius:10px;padding:9px 12px;
    font-size:12px;box-shadow:var(--sh-3);opacity:0;transition:opacity .12s ease;white-space:nowrap;z-index:5}
  .tip b{font-family:var(--mono);font-weight:600}
  .tip .tl{display:flex;align-items:center;gap:6px;margin-top:3px;color:rgba(255,255,255,.85)}
  .tip .tl i{width:8px;height:8px;border-radius:50%}

  /* donut */
  .donut-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 22px 8px}
  .donut{position:relative;width:188px;height:188px;margin:6px 0 14px}
  .donut svg{transform:rotate(-90deg)}
  .donut__center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut__center .num{font-family:var(--mono);font-size:30px;font-weight:600;letter-spacing:-.03em;color:var(--ink-1)}
  .donut__center .lbl{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:2px}
  .dgi-list{width:100%;display:flex;flex-direction:column;gap:2px;padding:6px 22px 20px}
  .dgi-row{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;transition:background .14s ease;cursor:default}
  .dgi-row:hover{background:var(--surface-2)}
  .dgi-row i{width:10px;height:10px;border-radius:50%;flex:none}
  .dgi-row .nm{font-size:13.5px;font-weight:500;color:var(--ink-1)}
  .dgi-row .ct{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--ink-2);font-weight:500}
  .dgi-row .pc{font-family:var(--mono);font-size:12px;color:var(--ink-4);width:42px;text-align:right}

  /* listbar (facturas) */
  .listbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tabs{display:inline-flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px}
  .tab{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-3);background:none;border:none;cursor:pointer;
    padding:7px 14px;border-radius:9px;transition:.14s ease;white-space:nowrap}
  .tab:hover{color:var(--ink-1)}
  .tab.is-active{background:#fff;color:var(--brand-1);font-weight:600;box-shadow:var(--sh-1)}
  .tab .cnt{font-family:var(--mono);font-size:11px;opacity:.7;margin-left:5px}
  .search--inline{margin-left:0;width:240px;height:40px}

  /* table */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);
    padding:11px 22px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap}
  thead th.r,tbody td.r{text-align:right}
  tbody td{padding:14px 22px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s ease}
  tbody tr:hover{background:var(--surface-2)}
  .cust{display:flex;align-items:center;gap:11px}
  .cust .nm{font-weight:600;color:var(--ink-1);line-height:1.2}
  .cust .ruc{font-family:var(--mono);font-size:11.5px;color:var(--ink-4)}
  .amt{font-family:var(--mono);font-weight:600;color:var(--ink-1)}
  .saldo{font-family:var(--mono);font-size:13px}
  .id-cell{font-family:var(--mono);font-size:12.5px;color:var(--brand-3);font-weight:500}
  .date-cell{font-family:var(--mono);font-size:12.5px;color:var(--ink-3)}
  .ruc-cell{font-family:var(--mono);font-size:12px;color:var(--ink-3)}
  .num-cell{font-family:var(--mono);font-size:13px;color:var(--ink-2)}

  .badge{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:600;
    padding:5px 12px;border-radius:999px;white-space:nowrap;min-width:118px}
  .badge svg{width:13px;height:13px}
  .b-green{background:var(--green-bg);color:var(--green)}
  .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-blue{background:var(--blue-bg);color:var(--blue)}
  .b-red{background:var(--red-bg);color:var(--red)}
  .b-gray{background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line)}
  .b-auto{min-width:0}
  .spin{animation:spin 1.1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .row-act{opacity:0;transition:opacity .14s ease;display:inline-flex;gap:4px}
  tbody tr:hover .row-act{opacity:1}
  .row-act button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-3);
    display:grid;place-items:center;cursor:pointer;transition:.12s}
  .row-act button:hover{color:var(--brand-1);border-color:#cfd9e8;background:var(--surface-2)}
  .row-act svg{width:15px;height:15px}

  /* empty state */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:80px 24px;gap:8px}
  .empty__chip{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;margin-bottom:8px;
    background:var(--blue-bg);color:var(--brand-3)}
  .empty__chip svg{width:30px;height:30px}
  .empty h2{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .empty p{color:var(--ink-3);font-size:14px;max-width:420px}

  /* modal */
  @keyframes overlayOut{from{opacity:1}to{opacity:0}}
  @keyframes modalIn{from{transform:translateY(10px) scale(.985)}to{transform:none}}
  .overlay{position:fixed;inset:0;background:rgba(10,18,38,.45);display:flex;align-items:center;justify-content:center;
    z-index:60;padding:24px}
  .overlay.closing{animation:overlayOut .15s ease forwards}
  .modal{background:#fff;border-radius:20px;width:min(720px,100%);max-height:90vh;overflow:auto;box-shadow:var(--sh-3);
    animation:modalIn .2s cubic-bezier(.2,.8,.2,1)}
  .modal__head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 24px 16px;border-bottom:1px solid var(--line)}
  .modal__title{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .modal__body{padding:22px 24px;display:flex;flex-direction:column;gap:20px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field__label{font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .field__label em{color:var(--red);font-style:normal;margin-left:2px}
  .input{font-family:var(--sans);font-size:14px;color:var(--ink-1);border:1px solid var(--line);background:var(--surface-2);
    border-radius:10px;padding:11px 13px;outline:none;transition:.14s ease;width:100%}
  .input:focus{background:#fff;border-color:var(--brand-3);box-shadow:0 0 0 4px rgba(37,99,235,.12)}
  .input.num{text-align:right;font-family:var(--mono)}
  .input[readonly]{color:var(--ink-3);cursor:default}
  .lineitems{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .li-head,.li-row{display:grid;grid-template-columns:1fr 70px 110px 70px 110px;gap:10px;align-items:center;padding:11px 14px}
  .li-head{background:var(--surface-2);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-4)}
  .li-head .num,.li-row .num{text-align:right}
  .li-row{border-top:1px solid var(--line-soft)}
  .li-row .amt{text-align:right;font-size:13.5px}
  .additem{display:inline-flex;align-items:center;gap:6px;margin:4px 14px 12px;font-family:var(--sans);font-size:13px;font-weight:600;
    color:var(--brand-3);background:none;border:none;cursor:pointer;padding:6px 0}
  .additem svg{width:15px;height:15px}
  .totals{margin-left:auto;width:280px;display:flex;flex-direction:column;gap:8px}
  .totals>div{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ink-2)}
  .totals .amt{color:var(--ink-1)}
  .totals__grand{border-top:1px solid var(--line);padding-top:10px;margin-top:2px;font-size:16px;font-weight:700;color:var(--ink-1)}
  .totals__grand .amt{font-size:18px}
  .modal__foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 24px;border-top:1px solid var(--line);background:var(--surface-2);flex-wrap:wrap}
  .modal__foot-actions{display:flex;gap:10px;margin-left:auto}

  @media (max-width:1080px){.kpis{grid-template-columns:repeat(2,1fr)}.grid-8-4{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand__mark">EP</div>
      <div><div class="brand__name">ERP Panamá</div><div class="brand__tag">Facturación electrónica</div></div>
    </div>
    <div class="nav-label">General</div>
    <nav class="nav" id="nav">
      <div class="nav__item is-active" data-screen="dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</div>
      <div class="nav__item" data-screen="facturas"><i data-lucide="file-text"></i>Facturas<span class="nav__badge">128</span></div>
      <div class="nav__item" data-screen="cotizaciones"><i data-lucide="file-edit"></i>Cotizaciones<span class="nav__badge">9</span></div>
      <div class="nav__item" data-screen="clientes"><i data-lucide="users"></i>Clientes</div>
      <div class="nav__item" data-screen="productos"><i data-lucide="package"></i>Productos</div>
      <div class="nav__item" data-screen="reportes"><i data-lucide="bar-chart-3"></i>Reportes</div>
    </nav>
    <div class="nav-label">Cuenta</div>
    <nav class="nav" id="nav2">
      <div class="nav__item" data-screen="config"><i data-lucide="settings"></i>Configuración</div>
      <div class="nav__item" data-screen="ayuda"><i data-lucide="life-buoy"></i>Ayuda</div>
    </nav>
